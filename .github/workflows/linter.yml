name: Ruff
on: [ push, pull_request ]
jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
            args: check --output-format=github
            src: >-
                ./src
                ./tests
                ./tests_autowrapt
                ./tests_aws